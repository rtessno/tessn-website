    <text x="86" y="48" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Tessn</text>
  </g>
  <g transform="translate(90 230)">
    <text fill="#7fe7d5" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4">CURRENT</text>
