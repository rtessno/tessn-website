    <text y="170" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">investigations.</text>
    <text y="230" fill="#cfe0e3" font-family="Inter, Arial, sans-serif" font-size="28">Evidence, reasoning, timelines, and handoffs in one traceable record.</text>
  </g>
  <text x="90" y="575" fill="#9bb8bf" font-family="Inter, Arial, sans-serif" font-size="20">Preview artwork · final domain and launch metadata pending</text>
