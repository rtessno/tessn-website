name: Validate static site

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compile Python verification helpers
        run: python3 -m py_compile scripts/*.py

      - name: Validate routes, assets, accessibility metadata, and preview controls
        run: python3 scripts/validate_site.py

      - name: Validate Current public product visual evidence
        run: python3 scripts/validate_product_visuals.py
